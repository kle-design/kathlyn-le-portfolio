  <script id="vs-fluid" type="x-shader/x-vertex">
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);

  </script>
  <script id="fs-fluid" type="x-shader/x-fragment">
precision highp float;
uniform float uSoftReset; uniform float iTime; uniform vec2 iResolution;
uniform vec4 iMouse; uniform int iFrame; uniform sampler2D iPreviousFrame;
uniform float uBrushSize; uniform float uBrushStrength; uniform float uFluidDecay;
uniform float uTrailLength; uniform float uStopDecay; uniform float uFlowSpeed;
varying vec2 vUv;
vec2 ur, U;
float ln(vec2 p, vec2 a, vec2 b) {
  return length(p - a - (b - a) * clamp(dot(p - a, b - a) / dot(b - a, b - a), 0.0, 1.0));
}
vec4 t(vec2 v, int a, int b) { return texture2D(iPreviousFrame, fract((v + vec2(float(a), float(b))) / ur)); }
vec4 t(vec2 v) { return texture2D(iPreviousFrame, fract(v / ur)); }
float area(vec2 a, vec2 b, vec2 c) {
  float A = length(b-c), B = length(c-a), C = length(a-b), s = 0.5*(A+B+C);
  return sqrt(max(0.0, s*(s-A)*(s-B)*(s-C)));
}
void main() {
  U = vUv * iResolution; ur = iResolution.xy;
  if (iFrame < 1) {
    float w = 0.5 + sin(0.2 * U.x) * 0.5;
    float q = length(U - 0.5 * ur);
    gl_FragColor = vec4(0.1 * exp(-0.001 * q * q), 0.0, 0.0, w);
  } else {
    vec2 v = U, A = v+vec2(1,1), B = v+vec2(1,-1), C = v+vec2(-1,1), D = v+vec2(-1,-1);
    for (int i = 0; i < 8; i++) {
      v -= uFlowSpeed * t(v).xy; A -= uFlowSpeed * t(A).xy;
      B -= uFlowSpeed * t(B).xy; C -= uFlowSpeed * t(C).xy; D -= uFlowSpeed * t(D).xy;
    }
    vec4 me = t(v);
    vec4 n = t(v,0,1), e = t(v,1,0), s = t(v,0,-1), wv = t(v,-1,0);
    me = mix(t(v), 0.25*(n+e+s+wv), vec4(0.15,0.15,0.95,0.0));
    me.z -= uFlowSpeed * 0.01 * ((area(A,B,C)+area(B,C,D)) - 4.0);
    vec4 pr = vec4(e.z, wv.z, n.z, s.z);
    me.xy = me.xy + (100.0*uFlowSpeed) * vec2(pr.x-pr.y, pr.z-pr.w) / ur;
    me.xy *= pow(uFluidDecay, uFlowSpeed); me.z *= uTrailLength;
    if (iMouse.z > 0.0) {
      vec2 mousePos = iMouse.xy, mousePrev = iMouse.zw;
      float q = ln(U, mousePos, mousePrev);
      vec2 m = mousePos - mousePrev; float l = length(m);
      if (l > 0.0) m = min(l, 10.0) * m / l;
      float falloff = pow(exp(-1e-4 / uBrushSize * q*q*q), 0.5);
      me.xyw += (0.03*uBrushStrength*uFlowSpeed) * falloff * vec3(m, 10.0);
      if (length(mousePos-mousePrev) < 2.0) {
        float d = length(U - mousePos);
        me.xy *= mix(1.0, uStopDecay, exp(-d * 0.01));
        me.z  *= mix(1.0, uStopDecay, exp(-d * 0.01));
      }
    }
    me = mix(me, vec4(0.0), uSoftReset);
    gl_FragColor = clamp(me, -0.4, 0.4);
  }
}
  </script>
  <script id="fs-display" type="x-shader/x-fragment">
precision highp float; precision highp int;
uniform float iTime; uniform vec2 iResolution; uniform sampler2D iFluid;
uniform float uDistortionAmount; uniform vec3 uColor1; uniform vec3 uColor2;
uniform vec3 uColor3; uniform vec3 uColor4; uniform float uColorIntensity;
uniform float uSoftness; uniform float uIdleSpeed;
varying vec2 vUv;
void main() {
  vec2 fragCoord = vUv * iResolution;
  vec4 fluid = texture2D(iFluid, vUv);
  float mr = min(iResolution.x, iResolution.y);
  vec2 uv = (fragCoord * 2.0 - iResolution.xy) / mr;
  uv += fluid.xy * (0.5 * uDistortionAmount);
  float tt = iTime * uIdleSpeed, d = -tt * 0.5, a = 0.0;
  for (float i = 0.0; i < 8.0; ++i) { a += cos(i - d - a * uv.x); d += sin(uv.y * i + a); }
  d += tt * 0.5;
  float m1 = cos(uv.x*d)*0.5+0.5, m2 = cos(uv.y*a)*0.5+0.5, m3 = sin(d+a)*0.5+0.5;
  float sm = clamp(uSoftness*0.1, 0.0, 0.9);
  m1 = mix(m1,0.5,sm); m2 = mix(m2,0.5,sm); m3 = mix(m3,0.5,sm);
  vec3 col = mix(uColor1, uColor2, m1);
  col = mix(col, uColor3, m2);
  col = mix(col, uColor4, m3 * 0.4);
  col *= uColorIntensity;
  gl_FragColor = vec4(col, 1.0);
  #include <tonemapping_fragment>
  #include <colorspace_fragment>
}
  </script>

    /* CURSOR */

  <script>
    /* ── IMAGE DATA ── */
    const IMAGES = [
      {
        src: 'Yoasobi Album Cover.jpg',
        carousel: [
          'My Design Journal/Yoasobi 1.png',
          'My Design Journal/Yoasobi 2.png',
          'My Design Journal/Yoasobi 3.png'
        ]
      },
      { src: 'My Design Journal/Hayao.jpg' },
      { src: 'My Design Journal/Totoro.png' },
      { src: 'My Design Journal/Spirited Away.png' },
      { src: 'My Design Journal/Mononoko.png' },
      { src: 'My Design Journal/Ponyo.png' },
      { src: 'My Design Journal/Howl.png' },
      {
        src: 'My Design Journal/Digifest 1.png',
        carousel: [
          'My Design Journal/Digifest 2.png',
          'My Design Journal/Digifest 3.png',
          'My Design Journal/Digifest 4.png'
        ]
      },
      { src: 'My Design Journal/Cows.jpg' },
      { src: 'My Design Journal/Bunny.jpg' },
      { src: 'My Design Journal/Wave To Earth.jpg' },
      { src: 'My Design Journal/Portrait.jpg' },
      { src: 'My Design Journal/Bike.jpg' },
      { src: 'My Design Journal/Graphite.jpg' },
      { src: 'My Design Journal/Cat.jpg' },
      { src: 'My Design Journal/Leon.jpg' },
      { src: 'My Design Journal/Teddy.jpg' },
    ];

    /* ── BUILD GRID ── */
    const grid = document.getElementById('journal-grid');
    IMAGES.forEach((data, idx) => {
      const item = document.createElement('div');
      item.className = 'journal-item';
      const img = document.createElement('img');
      img.src = data.src;
      img.alt = '';
      img.loading = 'lazy';
      item.appendChild(img);
      item.addEventListener('click', () => openLightbox(data));
      grid.appendChild(item);
    });

    /* ── LIGHTBOX ── */
    const lb        = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbThumbs  = document.getElementById('lb-thumbs');
    const lbClose   = document.getElementById('lb-close');

    function restartImgAnim() {
      lbImg.style.animation = 'none';
      void lbImg.offsetWidth;
      lbImg.style.animation = 'lbIn .34s cubic-bezier(0.34,1.40,0.64,1) forwards';
    }

    function setThumbActive(thumbEls, idx) {
      thumbEls.forEach((t, i) => t.classList.toggle('selected', i === idx));
    }

    function openLightbox(data) {
      lbImg.src = data.src;
      lbThumbs.innerHTML = '';
      lbThumbs.classList.remove('visible');

      if (data.carousel && data.carousel.length) {
        lbThumbs.classList.add('visible');
        const allSrcs = [data.src, ...data.carousel];
        const thumbEls = [];

        data.carousel.forEach((src, i) => {
          const th = document.createElement('img');
          th.src = src;
          th.className = 'lb-thumb';
          th.addEventListener('click', () => {
            lbImg.src = src;
            restartImgAnim();
            setThumbActive(thumbEls, i);
          });
          lbThumbs.appendChild(th);
          thumbEls.push(th);
        });
      }

      lb.classList.add('open');
      restartImgAnim();
    }

    function closeLightbox() {
      lb.classList.remove('open');
    }

    lbClose.addEventListener('click', closeLightbox);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    /* ── CURSOR ── */
    const dot  = document.getElementById('cdot');
    const ring = document.getElementById('cring');
    let rx = window.innerWidth * .5, ry = window.innerHeight * .5;
    let rawX = rx, rawY = ry;
    const lerp = (a, b, t) => a + (b - a) * t;

    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top  = e.clientY + 'px';
      rawX = e.clientX; rawY = e.clientY;
    });

    window.addEventListener('scroll', () => {
      const onDark = window.scrollY > window.innerHeight * 0.6;
      dot.style.background   = onDark ? 'rgba(255,255,255,.65)' : 'rgba(51,51,51,.55)';
      ring.style.borderColor = onDark ? 'rgba(255,255,255,.30)' : 'rgba(51,51,51,.22)';
    }, { passive: true });

    (function animRing() {
      rx = lerp(rx, rawX, .10); ry = lerp(ry, rawY, .10);
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    })();
  </script>

  <!-- WebGL Fluid (same as homepage) -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

    const asNumber = (v, d) => { const n = parseFloat(v); return Number.isFinite(n) ? n : d; };
    const asColorLinear = (hex, fallback = '#ffffff') => {
      let c; try { c = new THREE.Color(hex || fallback); } catch { c = new THREE.Color(fallback); }
      c.convertSRGBToLinear(); return [c.r, c.g, c.b];
    };
    const getShader = id => document.getElementById(id).textContent;

    const el   = document.querySelector('[fc-fluid-gradient="component"]') || document.body;
    const attr = name => el.getAttribute(name);

    const cfg = {
      brushSize:        asNumber(attr('fc-fluid-gradient-brush-size'),        28),
      brushStrength:    asNumber(attr('fc-fluid-gradient-brush-strength'),    0.48),
      distortionAmount: asNumber(attr('fc-fluid-gradient-distortion-amount'), 2.0),
      fluidDecay:       asNumber(attr('fc-fluid-gradient-fluid-decay'),       0.985),
      trailLength:      asNumber(attr('fc-fluid-gradient-trail-length'),      0.82),
      stopDecay:        asNumber(attr('fc-fluid-gradient-stop-decay'),        0.85),
      color1:           attr('fc-fluid-gradient-color-1') || '#acb0b8',
      color2:           attr('fc-fluid-gradient-color-2') || '#c8ccd3',
      color3:           attr('fc-fluid-gradient-color-3') || '#e2e5ea',
      color4:           attr('fc-fluid-gradient-color-4') || '#f5f7fa',
      colorIntensity:   asNumber(attr('fc-fluid-gradient-color-intensity'),   1.0),
      softness:         asNumber(attr('fc-fluid-gradient-softness'),          2.0),
      flowSpeed:        asNumber(attr('fc-fluid-gradient-flow-speed'),        1.0),
      idleSpeed:        asNumber(attr('fc-fluid-gradient-idle-speed'),        0.65),
      dprMax: 2.0,
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, cfg.dprMax));
    el.appendChild(renderer.domElement);

    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const rtOpts = { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat, type: THREE.HalfFloatType, depthBuffer: false, stencilBuffer: false };
    const rt1 = new THREE.WebGLRenderTarget(1, 1, rtOpts);
    const rt2 = rt1.clone();
    let cur = rt1, prev = rt2;

    const [c1r,c1g,c1b] = asColorLinear(cfg.color1);
    const [c2r,c2g,c2b] = asColorLinear(cfg.color2);
    const [c3r,c3g,c3b] = asColorLinear(cfg.color3);
    const [c4r,c4g,c4b] = asColorLinear(cfg.color4);

    const fMat = new THREE.ShaderMaterial({
      uniforms: {
        iTime: {value:0}, iResolution: {value: new THREE.Vector2(1,1)},
        iMouse: {value: new THREE.Vector4(0,0,0,0)}, iFrame: {value:0},
        iPreviousFrame: {value:null}, uBrushSize: {value:cfg.brushSize},
        uBrushStrength: {value:cfg.brushStrength}, uFluidDecay: {value:cfg.fluidDecay},
        uTrailLength: {value:cfg.trailLength}, uStopDecay: {value:cfg.stopDecay},
        uSoftReset: {value:0.0}, uFlowSpeed: {value:cfg.flowSpeed},
      },
      vertexShader: getShader('vs-fluid'), fragmentShader: getShader('fs-fluid'),
    });

    const dMat = new THREE.ShaderMaterial({
      uniforms: {
        iTime: {value:0}, iResolution: {value: new THREE.Vector2(1,1)},
        iFluid: {value:null}, uDistortionAmount: {value:cfg.distortionAmount},
        uColor1: {value: new THREE.Vector3(c1r,c1g,c1b)},
        uColor2: {value: new THREE.Vector3(c2r,c2g,c2b)},
        uColor3: {value: new THREE.Vector3(c3r,c3g,c3b)},
        uColor4: {value: new THREE.Vector3(c4r,c4g,c4b)},
        uColorIntensity: {value:cfg.colorIntensity}, uSoftness: {value:cfg.softness},
        uIdleSpeed: {value:cfg.idleSpeed},
      },
      vertexShader: getShader('vs-fluid'), fragmentShader: getShader('fs-display'), toneMapped: false,
    });

    function resize() {
      const r = el.getBoundingClientRect();
      const w = Math.max(1, r.width), h = Math.max(1, r.height);
      renderer.setSize(w, h);
      fMat.uniforms.iResolution.value.set(w, h);
      dMat.uniforms.iResolution.value.set(w, h);
      rt1.setSize(w, h); rt2.setSize(w, h);
    }
    resize();

    const geo = new THREE.PlaneGeometry(2, 2);
    const fPlane = new THREE.Mesh(geo, fMat);
    const dPlane = new THREE.Mesh(geo, dMat);

    const isFine = window.matchMedia('(pointer:fine)').matches;
    let mx=0, my=0, pmx=0, pmy=0, lastMove=0;
    if (isFine) {
      window.addEventListener('pointermove', e => {
        if (e.pointerType !== 'mouse') return;
        const r = el.getBoundingClientRect();
        const x = e.clientX - r.left, y = r.height - (e.clientY - r.top);
        const spd = Math.hypot(x-mx, y-my);
        fMat.uniforms.uBrushSize.value = cfg.brushSize * Math.min(1.2, Math.max(0.8, 0.8 + spd * 0.003));
        pmx=mx; pmy=my; mx=x; my=y; lastMove=performance.now();
        fMat.uniforms.iMouse.value.set(mx, my, pmx, pmy);
      });
    }

    let frame = 0;
    (function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;
      fMat.uniforms.iTime.value = t;
      dMat.uniforms.iTime.value = t;
      fMat.uniforms.iFrame.value = frame;
      if (performance.now() - lastMove > 120) fMat.uniforms.iMouse.value.set(0,0,0,0);
      fMat.uniforms.iPreviousFrame.value = prev.texture;
      renderer.setRenderTarget(cur); renderer.render(fPlane, camera);
      dMat.uniforms.iFluid.value = cur.texture;
      renderer.setRenderTarget(null); renderer.render(dPlane, camera);
      [cur, prev] = [prev, cur];
      frame++;
    })();

    let raf = null;
    window.addEventListener('resize', () => {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(resize);
    });
  </script>

</body>
</html>
